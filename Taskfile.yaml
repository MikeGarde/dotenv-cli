version: '3'

tasks:
  default:
    desc: Show the available tasks
    cmds:
      - task --list --sort alphanumeric

  setup:
    desc: "Setup development environment"
    silent: true
    status:
      - rustup target list --installed | grep -q x86_64-apple-darwin
      - rustup target list --installed | grep -q aarch64-apple-darwin
      - rustup target list --installed | grep -q x86_64-unknown-linux-gnu
      - rustup target list --installed | grep -q aarch64-unknown-linux-gnu
      - rustup target list --installed | grep -q x86_64-unknown-linux-musl
      - rustup target list --installed | grep -q aarch64-unknown-linux-musl
      - rustup target list --installed | grep -q x86_64-pc-windows-msvc
      - rustup target list --installed | grep -q aarch64-pc-windows-msvc
    cmds:
      - rustup target add x86_64-apple-darwin
      - rustup target add aarch64-apple-darwin
      - rustup target add x86_64-unknown-linux-gnu
      - rustup target add aarch64-unknown-linux-gnu
      - rustup target add x86_64-unknown-linux-musl
      - rustup target add aarch64-unknown-linux-musl
      - rustup target add x86_64-pc-windows-msvc
      - rustup target add aarch64-pc-windows-msvc

  test:
    desc: "Run all tests"
    cmds:
      - cargo clippy --all-targets --all-features -- -D warnings
      - cargo test --all-features

  build:
    desc: Build the project in release mode
    cmds:
      - task: build:release

  build:*:
    desc: Build the Rust binary with the requested Cargo profile
    vars:
      TARGET: '{{index .MATCH 0}}'
    cmds:
      - cargo build --profile {{.TARGET}}

  install:
    desc: "Install binary locally via cargo install --path ."
    cmds:
      - task: uninstall
      - cargo install --path .
  install:brew:
    desc: Install via Homebrew tap
    cmds:
      - task: uninstall
      - brew install mikegarde/tap/dotenv-cli
  install:npm:
    desc: Local development setup
    cmds:
      - task: uninstall
      - npm install
      - task: build:release
      - npm install -g
  install:npm:repo:
    desc: Local development setup
    cmds:
      - task: uninstall
      - npm install -g @mikegarde/dotenv-cli
  uninstall:
    desc: "Uninstall all local installations of dotenv-cli (cargo, npm, brew)"
    internal: true
    cmds:
      - cargo uninstall dotenv-cli || true
      - cargo uninstall --path . || true
      - brew uninstall mikegarde/tap/dotenv-cli || true
      - npm uninstall -g @mikegarde/dotenv-cli || true
      - npm uninstall -g || true

  is-branch-safe:
    desc: Check if the current branch is main
    vars:
      BRANCH:
        sh: git rev-parse --abbrev-ref HEAD
    cmds:
      - |
        if [ "{{.BRANCH}}" != "main" ] && [ "{{.BRANCH}}" != "develop" ]; then
          echo "Not on main or develop branch"
          exit 1
        fi

  release-*:
    desc: Create a new release, task release-[patch|minor|major]
    silent: true
    preconditions:
      - sh: task is-branch-safe
        msg: "Not on main or develop branch"
    vars:
      STEP: '{{index .MATCH 0}}'
    cmds:
      - devops/release/1-bump-version.sh {{.STEP}}
      - task test
      - devops/release/2-tag-version.sh
      - task release:assets
      - devops/release/4-generate-release-notes.sh
      - devops/release/5-create-github-release.sh
  publish:
    desc: Publish a release to npmjs and GitHub Packages
    preconditions:
      - task is-branch-safe
    cmds:
      - task: publish:npm
      - task: publish:github

  publish:npm:
    desc: Publish a release to npmjs
    preconditions:
      - task is-branch-safe
    cmds:
      - npm run publish:npm

  publish:github:
    desc: Publish a release to GitHub Packages
    preconditions:
      - task is-branch-safe
    cmds:
      - npm run publish:github

  release:publish:*:
    desc: Create a new release and publish it to npmjs and GitHub Packages
    vars:
      STEP: '{{index .MATCH 0}}'
    cmds:
      - task: release-{{.STEP}}
      - task: publish
